<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post" >
		<label for="Name">Name*</label>
		<input type="text" name="Name" id="name" required>
		<br><br>
		<label for="Email">Email*</label>
		<input type="email" name="email" required>
		<br><br>
		<label for="Password">Password*</label>
		<input type="password" name="Password" id="password" required>
		<br><br>
		<label for="gender">Gender*</label>
		<input type="radio" name="gender" value="Gender" required >
		<label for="Gender">Female</label>
		<input type="radio" name="gender" value="Gender" required >
		<label for="Gender">Male</label>
		<br><br>
		<select name="Laptop Brands" id="laptop" >
			<option value="Apple">Apple</option>
			<option value="Asus">Asus</option>
			<option value="HP">HP</option>
		</select>
		<br><br>
		<label for="age">Age*</label>
		<input type="number" name="Age" id="age" required>
		<br><br>
		<label for="dob">Date of Birth*</label>
		<input type="date" name="Date of Birth" id="dob" required">
		<br><br>
		<label for="portfolio">URL</label>
		<input type="url" name="url" id="portfolio">
		<br><br>
		<label for="button"></label>
		<button type="submit" name="button">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
